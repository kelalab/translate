<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Translategemma</title>
    <link rel="stylesheet" href="styles/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="logo">
                <h1 data-i18n="title">Translategemma</h1>
            </div>
            <div class="engine-controls">
                <div class="ui-locale-toggle">
                    <button class="locale-btn" data-lang="en">EN</button>
                    <button class="locale-btn" data-lang="fi">FI</button>
                    <button class="locale-btn" data-lang="sv">SV</button>
                </div>
                <button id="api-settings-btn" class="icon-btn" style="display: none;" title="API Settings">⚙</button>
                <select id="engine-select" class="modern-select">
                    <option value="local" data-i18n="builtIn">Built-in (Translategemma 4B)</option>
                </select>
            </div>
        </header>

        <main class="translator-grid">
            <div class="pane source-pane">
                <div class="pane-header">
                    <div class="custom-select" id="source-lang-select">
                        <div class="select-selected">English</div>
                        <div class="select-items select-hide">
                            <input type="text" class="select-search" placeholder="Search language...">
                            <div class="select-options"></div>
                        </div>
                    </div>
                </div>
                <textarea id="source-text" placeholder="Enter text to translate..." data-i18n-attr="placeholder:sourcePlace"></textarea>
                <div class="pane-footer">
                    <button class="icon-btn" id="paste-source" title="Paste"><span data-i18n="paste">📋 Paste</span></button>
                    <button class="icon-btn" id="clear-source" title="Clear"><span data-i18n="clear">✖ Clear</span></button>
                </div>
            </div>

            <div class="translate-action">
                <button id="translate-btn" class="action-btn">
                    <span class="btn-text" data-i18n="translate">Translate</span>
                    <span class="btn-spinner" style="display: none;">↻</span>
                </button>
            </div>

            <div class="pane target-pane">
                <div class="pane-header">
                    <div class="custom-select" id="target-lang-select">
                        <div class="select-selected">Finnish</div>
                        <div class="select-items select-hide">
                            <input type="text" class="select-search" placeholder="Search language...">
                            <div class="select-options"></div>
                        </div>
                    </div>
                </div>
                <textarea id="target-text" placeholder="Translation will appear here..." readonly data-i18n-attr="placeholder:targetPlace"></textarea>
                <div class="pane-footer">
                    <button class="icon-btn" id="copy-target" title="Copy"><span id="copy-target-text" data-i18n="copy">📋 Copy</span></button>
                </div>
            </div>
        </main>
        
        <section class="kela-accordion" id="history-accordion">
            <button class="accordion-header" id="history-toggle">
                <span data-i18n="historyTitle">Translation History</span>
                <span class="accordion-icon">▼</span>
            </button>
            <div class="accordion-content" id="history-content">
                <div id="history-list" class="history-list">
                    <!-- History cards will be appended here -->
                </div>
            </div>
        </section>
        
        <div class="error-toast" id="error-toast"></div>

        <div id="settings-modal" class="modal" style="display: none;">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>API Providers</h2>
                    <button id="close-settings" class="icon-btn">✖</button>
                </div>
                <div class="modal-body">
                    <div id="provider-list"></div>
                    <hr>
                    <h3 style="margin-top:1rem;margin-bottom:0.5rem;">Add Provider</h3>
                    <div style="display:flex; flex-direction:column; gap:0.5rem;">
                        <input type="text" id="prov-name" class="modern-input" placeholder="Name (e.g. Remote Ollama)">
                        <input type="text" id="prov-endpoint" class="modern-input" placeholder="Endpoint URL (e.g. http://host:11434/v1)">
                        <input type="password" id="prov-key" class="modern-input" placeholder="API Key (Optional)">
                        <input type="text" id="prov-models" class="modern-input" placeholder="Whitelist Models (comma separated, blank for all)">
                        <button id="add-provider-btn" class="action-btn" style="font-size:0.9rem; padding: 0.5rem;">Add Provider</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="locales.js"></script>
    <script src="renderer.js"></script>
</body>
</html>
